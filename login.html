<!DOCTYPE html>
<html lang="en">
<!-- Document Head: Metadata, Title, and External Links -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SpotTrack</title>
    
    <!-- Fonts and Stylesheets -->
    <link href="https://fonts.googleapis.com/css2?family=Istok+Web:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Main navigation bar component (Header) -->
    <header>
        <div class="logo">
            <a href="index.html">
                <img src="assets/img/logo.png" alt="SpotTrack Logo" class="logo-img">
            </a>
        </div>
        <div class="nav-actions">
            <button id="lang-toggle" class="btn-lang">ES</button>
        </div>
    </header>

    <!-- Login Section: User authentication form -->
    <section id="login-section">
        <div class="login-wrapper">
            <h2 data-i18n="login_welcome">Welcome Back</h2>
            <p data-i18n="login_subtitle">Enter your credentials to access your dashboard.</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" data-i18n="form_email_placeholder" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label data-i18n="login_password">Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit" data-i18n="nav_login">Login</button>
                <div class="login-links">
                    <a href="#" data-i18n="login_forgot">Forgot your password?</a>
                </div>
            </form>
        </div>
    </section>

    <!-- Footer Section: Links and Social Media -->
    <footer>
        <div class="footer-col">
            <div class="social-icons">
                <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
                <a href="#"><i class="fa-brands fa-youtube"></i></a>
                <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
            </div>
        </div>
        <div class="footer-col">
            <h4>Company</h4>
            <a href="index.html#about" data-i18n="nav_about">About Us</a>
            <a href="#">Careers</a>
            <a href="index.html#contact" data-i18n="nav_contact">Contact</a>
        </div>
        <div class="footer-col">
            <h4>Product</h4>
            <a href="index.html#features" data-i18n="nav_features">Features</a>
            <a href="index.html#pricing" data-i18n="nav_pricing">Pricing</a>
            <a href="#">Release Notes</a>
        </div>
        <div class="footer-col">
            <h4>Legal & Privacy</h4>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
            <a href="#">Cookie Settings</a>
        </div>
    </footer>

    <!--External Javascript-->
    <script src="js/main.js"></script>
</body>
</html>
